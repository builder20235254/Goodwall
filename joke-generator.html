<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <script>
        async function fetchJoke() {
            const response = await fetch('https://v2.jokeapi.dev/joke/Any');
            const data = await response.json();
            displayJoke(data);
        }

        function displayJoke(joke) {
            const jokeContainer = document.getElementById('jokeContainer');
            jokeContainer.innerHTML = ''; // Clear previous joke

            if (joke.type === 'single') {
                jokeContainer.innerHTML = `<p>${joke.joke}</p>`;
            } else if (joke.type === 'twopart') {
                jokeContainer.innerHTML = `<p>${joke.setup}</p><p>${joke.delivery}</p>`;
            }
        }
    </script>
</head>
<body>
    <h1>Random Joke Generator</h1>
    <button onclick="fetchJoke()">Fetch a Joke</button>
    <div id="jokeContainer"></div>
</body>
</html>
